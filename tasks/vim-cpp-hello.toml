[task]
id = "vim-cpp-hello"
goal = """在 Ubuntu 桌面上使用 GUI 操作完成以下任务：

目标：通过 vim 编写一个 C++ Hello World 程序，编译并运行成功。

步骤指导（全部通过 GUI 操作）：
1. 点击终端窗口内的命令输入区域（黑色区域，有 $ 提示符的地方）
2. 输入 vim /tmp/hello.cpp 然后按 Enter 打开 vim
3. 按 i 进入插入模式
4. 逐字输入以下 C++ 代码：
   #include <iostream>
   int main() { std::cout << "Hello World" << std::endl; return 0; }
5. 按 Escape 退出插入模式
6. 输入 :wq 然后按 Enter 保存退出
7. 输入 g++ /tmp/hello.cpp -o /tmp/hello 然后按 Enter 编译
8. 输入 /tmp/hello 然后按 Enter 运行

重要要求：
- 必须使用 locate_and_click、type_text、press_key 等 GUI 动作
- 不要使用 execute_command 或 write_file
- 编译必须成功，/tmp/hello 二进制文件必须存在且可运行
- 如果编译失败（终端显示 error），需要重新编辑文件修复代码再编译
"""
tags = ["gui", "cpp", "vim"]
timeout_s = 300

[setup]
target = "osworld"
commands = ["rm -f /tmp/hello.cpp /tmp/hello"]

[verify]
target = "osworld"
command = "/tmp/hello"
expected_stdout_regex = "Hello"
